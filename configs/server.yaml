# Any setting here can also be set via a CLOCKD_* environment variable, which
# takes precedence over this file. Nested fields use "__" as the delimiter:
#   CLOCKD_METRICS__INFLUXDB_V2__TOKEN
#   CLOCKD_EVENT_SOURCES__HOME_NVR__UNIFI__PASSWORD
# Use env vars to keep secrets out of this file (see deploy/k8s-example.yaml).

host: "0.0.0.0"
port: 8000
verbose: false
detection_backend: "local"  # "local", "roboflow", "localai", or "codeproject_ai"
# Optional: fall back to local CPU inference (using `model`) when a remote
# detection backend is unreachable. "none" (default) keeps the old behavior
# of logging and yielding empty detections.
# detection_fallback: "local"
model: "yolo26n.pt"
confidence: 0.3
default_unit: "mph"
max_upload_mb: 200
max_workers: 2
job_ttl_seconds: 3600
cameras_dir: "configs/cameras"
max_cameras: 50
upload_dir: "/tmp/clockd_uploads"

codeproject_ai:
  url: "http://localhost:32168"
  timeout: 30

roboflow:
  url: "http://localhost:9001"
  model_id: "yolo11n-640"
  timeout: 30
  # Optional: downscale frames to this longest-side size before sending.
  # The server resizes to the model input anyway; enabling this trades a
  # little local CPU for much smaller uploads. Omit to send full frames.
  # resize_max_px: 640

# coralapi Edge TPU server (https://github.com/nathan-v/coralapi)
coralapi:
  url: "http://localhost:8000"
  model: "ssd_mobilenet_v2_coco_quant_postprocess_edgetpu"
  timeout: 30
  # Edge TPU SSD models run at 300x300; downscaling before upload saves
  # bandwidth with no accuracy cost (boxes are returned normalized).
  # resize_max_px: 640

localai:
  url: "http://localhost:8080"
  model: "rfdetr-base"
  timeout: 30

metrics:
  prometheus:
    enabled: false
    path: "/metrics"
  influxdb_v1:
    enabled: false
    url: "http://localhost:8086"
    database: "clockd"
    username: ""
    password: ""
    measurement: "vehicle_speed"
  influxdb_v2:
    enabled: false
    url: "http://localhost:8086"
    token: ""
    org: ""
    bucket: "clockd"
    measurement: "vehicle_speed"

# Event sources — poll NVRs for vehicle detection events and process clips
# automatically. See README.md for details.
